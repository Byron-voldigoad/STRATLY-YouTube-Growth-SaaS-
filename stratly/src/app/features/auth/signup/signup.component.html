<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 px-4">
    <div class="w-full max-w-md">

        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="flex flex-col items-center justify-center gap-3">
                <img src="/assets/images/logo.png" alt="Stratly Logo" class="h-14 w-auto drop-shadow-sm">
                <h1 class="text-3xl font-bold text-slate-900 font-heading">Stratly</h1>
            </div>
            <p class="text-slate-500 mt-2">Créez votre compte</p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-lg p-8">

            <!-- Success Message -->
            @if (successMessage) {
            <div class="bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded-lg mb-6 text-sm">
                {{ successMessage }}
            </div>
            }

            <!-- Error Message -->
            @if (errorMessage) {
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6 text-sm">
                {{ errorMessage }}
            </div>
            }

            <!-- Google Signup -->
            <button hlmBtn variant="outline" (click)="handleGoogleSignup()" [disabled]="loading"
                class="w-full flex items-center justify-center gap-3 mb-6 h-12">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"
                        fill="#4285F4" />
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853" />
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                        fill="#FBBC05" />
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335" />
                </svg>
                <span class="text-sm font-medium text-gray-700">Continuer avec Google</span>
            </button>

            <!-- Divider -->
            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-4 bg-white text-gray-400">ou</span>
                </div>
            </div>

            <!-- Email Form -->
            <form (ngSubmit)="handleSignup()">
                <div class="space-y-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="votre@email.com"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm"
                            [disabled]="loading" />
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
                        <input id="password" type="password" [(ngModel)]="password" name="password"
                            placeholder="Minimum 6 caractères"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm"
                            [disabled]="loading" />
                    </div>

                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">Confirmer le
                            mot de passe</label>
                        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                            placeholder="••••••••"
                            class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all text-sm"
                            [disabled]="loading" />
                    </div>

                    <button hlmBtn type="submit" [disabled]="loading" class="w-full h-12">
                        {{ loading ? 'Création...' : 'Créer mon compte' }}
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <p class="text-center mt-6 text-sm text-gray-500">
            Déjà un compte ?
            <a routerLink="/login" class="text-blue-600 hover:text-blue-700 font-medium">Se connecter</a>
        </p>
    </div>
</div>
