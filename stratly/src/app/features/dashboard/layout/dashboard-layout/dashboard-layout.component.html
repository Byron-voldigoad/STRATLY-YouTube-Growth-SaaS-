<div class="flex h-screen bg-gray-50">

    <!-- Sidebar -->
    <aside class="bg-white border-r border-gray-200 flex flex-col transition-all duration-300"
        [class.w-64]="sidebarOpen" [class.w-16]="!sidebarOpen">
        <!-- Logo -->
        <div class="h-16 flex items-center justify-center px-4 border-b border-gray-100">
            @if (sidebarOpen) {
            <div class="flex items-center gap-3 w-full">
                <img src="/assets/images/logo.png" alt="Stratly" class="h-8 w-auto">
                <h1 class="text-2xl font-bold text-slate-900 font-heading">Stratly</h1>
            </div>
            } @else {
            <img src="/assets/images/logo.png" alt="Stratly" class="h-8 w-auto">
            }
        </div>

        <!-- Navigation -->
        <nav class="flex-1 py-4 px-2 space-y-1">
            @for (item of navItems; track item.path) {
            <a [routerLink]="item.path" routerLinkActive="bg-blue-50 text-blue-700"
                [routerLinkActiveOptions]="{ exact: item.exact }"
                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors">
                <!-- Icons -->
                <ng-icon [name]="item.icon" class="w-5 h-5 flex-shrink-0"></ng-icon>
                @if (sidebarOpen) {
                <span>{{ item.label }}</span>
                }
            </a>
            }
        </nav>

        <!-- Bottom -->
        <div class="p-2 border-t border-gray-100">
            <button (click)="handleSignOut()"
                class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm font-medium text-gray-600 hover:bg-red-50 hover:text-red-600 transition-colors">
                <ng-icon name="lucideLogOut" class="w-5 h-5 flex-shrink-0"></ng-icon>
                @if (sidebarOpen) {
                <span>Déconnexion</span>
                }
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">

        <!-- Header -->
        <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
            <button (click)="toggleSidebar()"
                class="p-2 rounded-lg hover:bg-gray-100 transition-colors h-10 w-10 flex items-center justify-center">
                <ng-icon name="lucideMenu" class="w-5 h-5 text-gray-600"></ng-icon>
            </button>
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center">
                    <span class="text-blue-600 text-sm font-medium">U</span>
                </div>
            </div>
        </header>

        <!-- Page Content -->
        <main class="flex-1 overflow-y-auto p-6">
            <router-outlet />
        </main>
    </div>
</div>
