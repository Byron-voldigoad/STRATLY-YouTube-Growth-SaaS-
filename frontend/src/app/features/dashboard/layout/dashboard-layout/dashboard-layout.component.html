<div class="flex h-screen bg-slate-50 font-sans text-slate-900 selection:bg-indigo-500/30 overflow-hidden">
  <div *ngIf="isMobile && sidebarOpen" class="fixed inset-0 bg-black/40 z-20" (click)="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside
    class="bg-white border-r border-slate-200 flex flex-col transition-all duration-300 shadow-[4px_0_24px_rgba(0,0,0,0.02)] fixed inset-y-0 left-0 z-30 lg:relative lg:z-auto"
    [class.w-72]="sidebarOpen" [class.w-20]="!isMobile && !sidebarOpen"
    [class.-translate-x-full]="isMobile && !sidebarOpen" [class.translate-x-0]="isMobile && sidebarOpen">
    <!-- Logo -->
    <div class="h-20 flex items-center justify-center px-4 border-b border-slate-100 bg-transparent relative">
      @if (sidebarOpen) {
      <div class="flex items-center gap-3 w-full px-2">
        <img src="/assets/images/nerra_ligth.png" alt="Nerra" class="h-8 w-auto" />
        <h1 class="text-2xl font-black text-slate-900 tracking-tight">
          Nerra
        </h1>
      </div>
      } @else {
      <img src="/assets/images/nerra_ligth.png" alt="Nerra" class="h-8 w-auto transition-transform hover:scale-110" />
      }
    </div>

    <!-- Navigation -->
    <nav class="flex-1 py-6 px-3 space-y-2 overflow-y-auto">
      @for (item of navItems; track item.path) {
      <a [routerLink]="item.disabled ? null : item.path"
        routerLinkActive="bg-slate-900 text-white shadow-md shadow-slate-900/20" #rla="routerLinkActive"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="flex items-center gap-3 px-3 py-3 rounded-xl text-sm font-bold transition-all group relative overflow-hidden"
        [class.text-slate-500]="item.disabled || !rla.isActive"
        [class.hover:bg-slate-100]="!item.disabled && !rla.isActive"
        [class.hover:text-slate-900]="!item.disabled && !rla.isActive" [class.opacity-50]="item.disabled"
        [class.pointer-events-none]="item.disabled">
        <!-- Hover Glow Effect for active -->
        @if (rla.isActive) {
        <div
          class="absolute inset-0 bg-gradient-to-r from-indigo-500/20 to-purple-500/20 opacity-0 group-hover:opacity-100 transition-opacity">
        </div>
        }

        <!-- Icons -->
        <ng-icon [name]="item.icon"
          class="w-5 h-5 flex-shrink-0 relative z-10 transition-transform group-hover:scale-110"></ng-icon>

        @if (sidebarOpen) {
        <span class="relative z-10">{{ item.label }}</span>
        }
      </a>
      }
    </nav>

    <!-- Bottom Actions -->
    <div class="p-3 border-t border-slate-100 space-y-2 bg-slate-50/50">
      <button (click)="toggleNicheDetector()"
        class="flex items-center gap-3 w-full px-3 py-3 rounded-xl text-sm font-bold transition-all group" [ngClass]="
          nicheDetectorOpen
            ? 'bg-indigo-50 text-indigo-700 shadow-sm'
            : 'text-slate-500 hover:bg-slate-200/50 hover:text-slate-900'
        ">
        <ng-icon name="lucideTarget" class="w-5 h-5 flex-shrink-0 group-hover:rotate-12 transition-transform"
          [class.text-indigo-600]="nicheDetectorOpen"></ng-icon>
        @if (sidebarOpen) {
        <span>Niche Detector</span>
        }
      </button>
      <button (click)="handleSignOut()"
        class="flex items-center gap-3 w-full px-3 py-3 rounded-xl text-sm font-bold text-slate-500 hover:bg-rose-50 hover:text-rose-600 transition-all group">
        <ng-icon name="lucideLogOut"
          class="w-5 h-5 flex-shrink-0 group-hover:-translate-x-1 transition-transform"></ng-icon>
        @if (sidebarOpen) {
        <span>Déconnexion</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
    <!-- Background glow -->
    <div
      class="absolute top-0 right-0 w-[500px] h-[500px] bg-indigo-500/5 blur-[120px] rounded-full pointer-events-none -z-10">
    </div>
    <div
      class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-purple-500/5 blur-[120px] rounded-full pointer-events-none -z-10">
    </div>

    <!-- Header -->
    <header
      class="h-20 bg-white/60 backdrop-blur-xl border-b border-slate-200/50 flex items-center justify-between px-8 shrink-0 z-10 transition-all">
      <div class="flex items-center gap-4">
        <button (click)="toggleSidebar()"
          class="p-2.5 rounded-xl hover:bg-slate-200/50 text-slate-500 hover:text-slate-900 transition-all flex items-center justify-center group focus:outline-none focus:ring-2 focus:ring-indigo-500/20">
          <ng-icon name="lucideMenu" class="w-5 h-5 group-hover:scale-110 transition-transform"></ng-icon>
        </button>
        <div class="hidden sm:block">
          <span class="text-sm font-bold text-slate-900 tracking-tight">{{
            getPageTitle()
            }}</span>
        </div>
      </div>

      <div class="flex items-center gap-5">
        <!-- Notifications or other actions could go here -->
        <div class="h-8 w-px bg-slate-200"></div>

        <div class="flex items-center gap-3 cursor-pointer group">
          <div class="flex flex-col items-end hidden sm:flex">
            <span class="text-sm font-bold text-slate-900 group-hover:text-indigo-600 transition-colors">Créateur
              Nerra</span>
            <span class="text-xs font-semibold text-slate-400">Pro Plan</span>
          </div>
          <div
            class="w-10 h-10 bg-gradient-to-tr from-indigo-500 to-purple-500 rounded-xl flex items-center justify-center shadow-md shadow-indigo-500/20 transform group-hover:scale-105 transition-all">
            <span class="text-white text-sm font-black">CS</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-y-auto p-4 md:p-8 relative">
      <div class="max-w-7xl mx-auto h-full">
        <router-outlet />
      </div>
    </main>
  </div>
</div>

<!-- Niche Detector Panel -->
@if (nicheDetectorOpen) {
<app-niche-detector (close)="nicheDetectorOpen = false"></app-niche-detector>
}
